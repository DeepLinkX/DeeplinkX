name: Build & Deploy Example Web

on:
  push:
    branches: [ master ]
    paths:
      - "example/**"
      - "lib/**"
      - "analysis_options.yaml"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/deploy-example-web.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  # Never cancel an in-flight production deployment; queued runs are superseded.
  cancel-in-progress: false

env:
  FLUTTER_VERSION: ${{ vars.FLUTTER_VERSION || '3.41.1' }}
  FLUTTER_CHANNEL: ${{ vars.FLUTTER_CHANNEL || 'stable' }}
  # For a project page like https://<user>.github.io/<repo>/
  BASE_HREF: "/${{ github.event.repository.name }}/"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          pub-cache: true
          cache-key: "deeplinkx-flutter-:os:-:channel:-:version:-:arch:-:hash:"
          pub-cache-key: "deeplinkx-example-pub-:os:-:channel:-:version:-:arch:-:hash:"

      - name: Flutter version
        run: flutter --version

      - name: Pub get (example)
        working-directory: example
        run: flutter pub get

      - name: Build example for web (release)
        working-directory: example
        run: |
          flutter build web \
            --release \
            --wasm \
            --base-href "$BASE_HREF"
          # SPA fallback for GitHub Pages
          cp -v build/web/index.html build/web/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: example/build/web

  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
