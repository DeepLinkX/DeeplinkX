name: Pub Readiness

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: ${{ vars.FLUTTER_VERSION || '3.41.1' }}
  FLUTTER_CHANNEL: ${{ vars.FLUTTER_CHANNEL || 'stable' }}

jobs:
  pub-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          pub-cache: true
          cache-key: "deeplinkx-flutter-:os:-:channel:-:version:-:arch:-:hash:"
          pub-cache-key: "deeplinkx-pub-:os:-:channel:-:version:-:arch:-:hash:"

      - name: Flutter version
        run: flutter --version

      - name: Flutter pub get
        run: flutter pub get

      - name: Install WebP tools
        run: |
          sudo apt-get update
          sudo apt-get install -y webp

      - name: Activate Pana
        # Intentionally unpinned so CI scoring tracks the live pana version
        # used by pub.dev.
        run: dart pub global activate pana

      - name: Check Pana score
        run: dart pub global run pana --exit-code-threshold 0 .

      - name: Publish dry run
        run: flutter pub publish --dry-run
